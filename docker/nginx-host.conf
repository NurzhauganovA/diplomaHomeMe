# /etc/nginx/sites-available/homeme
# Host Nginx — SSL + proxy to Docker (port 8082)
#
# Установка:
#   sudo cp docker/nginx-host.conf /etc/nginx/sites-available/homeme
#   sudo ln -s /etc/nginx/sites-available/homeme /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d sushizza.kz -d www.sushizza.kz

server {
    listen 80;
    server_name sushizza.kz www.sushizza.kz;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name sushizza.kz www.sushizza.kz;

    ssl_certificate /etc/letsencrypt/live/sushizza.kz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sushizza.kz/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 50M;

    location / {
        proxy_pass http://127.0.0.1:8082;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 90s;
    }
}
