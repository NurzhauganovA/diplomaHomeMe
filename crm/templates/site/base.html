<!DOCTYPE html>
<html lang="ru" class="scroll-smooth">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}HomeMe — Умная недвижимость{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: { 50:'#eff6ff', 100:'#dbeafe', 500:'#3b82f6', 600:'#2563eb', 700:'#1d4ed8', 900:'#1e3a8a' }
          }
        }
      }
    }
  </script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <style>
    [x-cloak] { display: none !important; }
    .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .line-clamp-3 { display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
  </style>
</head>
<body class="bg-gray-50 text-slate-800 antialiased font-sans">

<!-- ══════════ HEADER ══════════ -->
<header class="sticky top-0 z-50 bg-white/95 backdrop-blur-sm border-b border-slate-200 shadow-sm" x-data="{ mobileOpen: false }">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="flex items-center justify-between h-16">

      <!-- Logo -->
      <a href="{% url 'properties:home' %}" class="flex items-center gap-2.5">
        <div class="w-9 h-9 bg-brand-600 rounded-xl flex items-center justify-center shadow-lg shadow-brand-600/20">
          <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
          </svg>
        </div>
        <span class="text-xl font-bold text-slate-900">HomeMe</span>
      </a>

      <!-- Desktop nav -->
      <nav class="hidden md:flex items-center gap-1">
        <a href="{% url 'properties:home' %}"
           class="px-4 py-2 rounded-xl text-sm font-medium text-slate-600 hover:text-brand-600 hover:bg-brand-50 transition-all">
          Главная
        </a>
        <a href="{% url 'properties:complex_list' %}"
           class="px-4 py-2 rounded-xl text-sm font-medium text-slate-600 hover:text-brand-600 hover:bg-brand-50 transition-all">
          Новостройки
        </a>
        <a href="{% url 'properties:secondary_list' %}"
           class="px-4 py-2 rounded-xl text-sm font-medium text-slate-600 hover:text-brand-600 hover:bg-brand-50 transition-all">
          Вторичка
        </a>
      </nav>

      <!-- Right actions -->
      <div class="flex items-center gap-3">
        {% if user.is_authenticated and user.is_staff %}
        <a href="{% url 'crm:dashboard' %}"
           class="hidden md:flex items-center gap-2 px-4 py-2 text-sm font-medium text-slate-600 border border-slate-200 rounded-xl hover:border-brand-300 hover:text-brand-600 transition-all">
          <i data-lucide="layout-dashboard" class="w-4 h-4"></i>
          CRM
        </a>
        {% endif %}

        <!-- Mobile menu toggle -->
        <button @click="mobileOpen = !mobileOpen" class="md:hidden p-2 rounded-xl text-slate-500 hover:bg-slate-100">
          <i data-lucide="menu" class="w-5 h-5"></i>
        </button>
      </div>
    </div>

    <!-- Mobile Menu -->
    <div x-show="mobileOpen" x-cloak x-transition class="md:hidden pb-4 border-t border-slate-100 pt-3 space-y-1">
      <a href="{% url 'properties:home' %}" class="block px-4 py-2.5 rounded-xl text-sm text-slate-700 hover:bg-slate-50">Главная</a>
      <a href="{% url 'properties:complex_list' %}" class="block px-4 py-2.5 rounded-xl text-sm text-slate-700 hover:bg-slate-50">Новостройки</a>
      <a href="{% url 'properties:secondary_list' %}" class="block px-4 py-2.5 rounded-xl text-sm text-slate-700 hover:bg-slate-50">Вторичка</a>
    </div>
  </div>
</header>

<!-- ══════════ CONTENT ══════════ -->
{% block content %}{% endblock %}

<!-- ══════════ FOOTER ══════════ -->
<footer class="bg-slate-900 text-slate-400 mt-16">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-10">
    <div class="flex flex-col md:flex-row items-center justify-between gap-4">
      <div class="flex items-center gap-2.5">
        <div class="w-8 h-8 bg-brand-600 rounded-xl flex items-center justify-center">
          <svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
          </svg>
        </div>
        <span class="text-white font-semibold">HomeMe</span>
      </div>
      <p class="text-sm">© 2026 HomeMe · Умная платформа недвижимости · Дипломный проект</p>
      <div class="flex items-center gap-4 text-sm">
        <a href="{% url 'properties:complex_list' %}" class="hover:text-white transition-colors">Новостройки</a>
        <a href="{% url 'properties:secondary_list' %}" class="hover:text-white transition-colors">Вторичка</a>
      </div>
    </div>
  </div>
</footer>

<script>lucide.createIcons();</script>
{% block extra_js %}{% endblock %}
</body>
</html>
